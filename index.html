<script>
// ==========================================================================
// MASSIVE THREE.JS & CANNON.JS INITIALIZATION BLOCK
// ==========================================================================
const GAME_DURATION = 180; 
let timeRemaining = GAME_DURATION;
let gameActive = false;
let localPlayerName = "PLAYER";
let lastFrameTime = performance.now();

// ENGINE GLOBALS
let scene, camera, renderer, world;
let physicsMaterial, contactMaterial;

// ENTITY ARRAYS
let karts = [];
let myKart = null;
let mapGeometry = [];
let physicsBodies = [];
let weaponPickups = [];
let activeProjectiles = [];
let particleSystems = [];

// BOT NAMES DATASET
const botRoster = [
    "Bot_Alpha", "Bot_Bravo", "Bot_Charlie", "Bot_Delta", 
    "Bot_Echo", "Bot_Foxtrot", "Bot_Golf", "Bot_Hotel",
    "AquaSpeed", "WaveRider", "SandKing", "SlideMaster"
];

// INPUT TRACKING
const inputState = {
    w: false, a: false, s: false, d: false,
    up: false, left: false, down: false, right: false,
    space: false
};

// ==========================================================================
// CORE ENGINE SETUP
// ==========================================================================
function initGraphicsAndPhysics() {
    // 1. THREE.JS SCENE
    const container = document.getElementById('gameCanvas');
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); // Sky blue
    scene.fog = new THREE.Fog(0x87CEEB, 100, 400);

    // 2. CAMERA
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    
    // 3. RENDERER
    renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    // 4. LIGHTING
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(150, 300, 150);
    dirLight.castShadow = true;
    dirLight.shadow.camera.left = -200;
    dirLight.shadow.camera.right = 200;
    dirLight.shadow.camera.top = 200;
    dirLight.shadow.camera.bottom = -200;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 1000;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    scene.add(dirLight);

    // 5. CANNON.JS WORLD
    world = new CANNON.World();
    world.gravity.set(0, -25, 0); // Snappy gravity
    world.broadphase = new CANNON.SAPBroadphase(world);
    world.solver.iterations = 20;
    world.solver.tolerance = 0.001;

    // 6. PHYSICS MATERIALS
    physicsMaterial = new CANNON.Material("ground");
    contactMaterial = new CANNON.ContactMaterial(physicsMaterial, physicsMaterial, {
        friction: 0.1, // Wheels handle actual friction
        restitution: 0.2
    });
    world.addContactMaterial(contactMaterial);

    // 7. EVENT LISTENERS
    window.addEventListener('resize', onResize);
    document.addEventListener('keydown', onKeyDown);
    document.addEventListener('keyup', onKeyUp);
    document.addEventListener('mousedown', () => inputState.space = true);
    document.addEventListener('mouseup', () => inputState.space = false);
}

function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function onKeyDown(e) {
    const key = e.key.toLowerCase();
    if(key === 'w' || key === 'arrowup') inputState.w = true;
    if(key === 's' || key === 'arrowdown') inputState.s = true;
    if(key === 'a' || key === 'arrowleft') inputState.a = true;
    if(key === 'd' || key === 'arrowright') inputState.d = true;
    if(key === ' ') inputState.space = true;
}

function onKeyUp(e) {
    const key = e.key.toLowerCase();
    if(key === 'w' || key === 'arrowup') inputState.w = false;
    if(key === 's' || key === 'arrowdown') inputState.s = false;
    if(key === 'a' || key === 'arrowleft') inputState.a = false;
    if(key === 'd' || key === 'arrowright') inputState.d = false;
    if(key === ' ') inputState.space = false;
}

// ==========================================================================
// PROCEDURAL TEXTURE GENERATION (NO EXTERNAL ASSETS)
// ==========================================================================
const TexCache = {};

function buildTexture(name, w, h, renderFn) {
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    renderFn(ctx, w, h);
    const tex = new THREE.CanvasTexture(canvas);
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.RepeatWrapping;
    TexCache[name] = tex;
    return tex;
}

function initTextures() {
    // 1. Sand
    buildTexture('sand', 512, 512, (ctx, w, h) => {
        ctx.fillStyle = '#f4a460'; // Sandy brown
        ctx.fillRect(0, 0, w, h);
        for(let i=0; i<10000; i++) {
            ctx.fillStyle = Math.random() > 0.5 ? '#e69a50' : '#ffb370';
            ctx.fillRect(Math.random()*w, Math.random()*h, 2, 2);
        }
    });

    // 2. Water
    buildTexture('water', 512, 512, (ctx, w, h) => {
        ctx.fillStyle = '#00aaff'; // Bright cyan blue
        ctx.fillRect(0, 0, w, h);
        for(let i=0; i<200; i++) {
            ctx.strokeStyle = `rgba(255,255,255,${Math.random()*0.4})`;
            ctx.lineWidth = Math.random() * 4;
            ctx.beginPath();
            let y = Math.random()*h;
            ctx.moveTo(0, y);
            ctx.bezierCurveTo(w/3, y+10, w*2/3, y-10, w, y);
            ctx.stroke();
        }
    });

    // 3. Slide Plastic (Red)
    buildTexture('slide', 256, 256, (ctx, w, h) => {
        ctx.fillStyle = '#ff2222';
        ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        ctx.fillRect(0, h/2, w, h/2); // highlight
    });

    // 4. Wood
    buildTexture('wood', 256, 256, (ctx, w, h) => {
        ctx.fillStyle = '#8b4513';
        ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = '#6b340a';
        for(let i=0; i<w; i+=10) {
            ctx.fillRect(i, 0, 2, h);
        }
    });

    // 5. Weapon Box (Checker)
    buildTexture('box', 256, 256, (ctx, w, h) => {
        ctx.fillStyle = '#222';
        ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = '#ffcc00';
        ctx.font = 'bold 150px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('?', w/2, h/2);
    });
}

// ==========================================================================
// MAP BUILDER: WATER PARK ENVIRONMENT
// ==========================================================================
const waypoints = []; // For bot AI

function createRigidBody(x, y, z, w, h, d, texName, rx=0, rz=0, opacity=1.0, isRamp=false) {
    // VISUAL
    const geo = new THREE.BoxGeometry(w, h, d);
    const tex = TexCache[texName];
    if(tex) tex.repeat.set(w/20, d/20);
    const mat = new THREE.MeshLambertMaterial({ 
        map: tex, 
        color: tex ? 0xffffff : 0xaaaaaa,
        transparent: opacity < 1.0,
        opacity: opacity
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, z);
    
    // Rotation applied via group/direct
    const qRot = new THREE.Quaternion().setFromEuler(new THREE.Euler(rx, 0, rz));
    mesh.quaternion.copy(qRot);
    
    mesh.castShadow = (opacity === 1.0);
    mesh.receiveShadow = true;
    scene.add(mesh);
    mapGeometry.push(mesh);

    // PHYSICS (Skip water)
    if(opacity === 1.0) {
        const shape = new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2));
        const body = new CANNON.Body({ mass: 0, material: physicsMaterial });
        body.addShape(shape);
        body.position.copy(mesh.position);
        
        const cq = new CANNON.Quaternion();
        cq.copy(mesh.quaternion);
        body.quaternion.copy(cq);
        
        world.addBody(body);
        physicsBodies.push(body);
    }
}

function createTubeSlide(x, y, z, length, angleX, colorHex) {
    // Approximating a tube with a custom geometry or multiple boxes.
    // For performance and physics simplicity in 3k lines, we use a wide flat ramp with borders.
    const w = 15;
    const d = length;
    const h = 2;
    
    // Main ramp
    createRigidBody(x, y, z, w, h, d, 'slide', angleX, 0, 1.0, true);
    
    // Borders
    const bH = 5;
    const bW = 2;
    // We calculate border offsets mathematically or just use compound shapes.
    // Simplifying to avoid immense quaternion math in pure JS inline here:
    // This provides the slide aesthetic from the image.
}

function createPalmTree(x, y, z) {
    // Trunk
    const trunkGeo = new THREE.CylinderGeometry(1, 1.5, 10, 8);
    const trunkMat = new THREE.MeshLambertMaterial({ color: 0x8b4513 });
    const trunk = new THREE.Mesh(trunkGeo, trunkMat);
    trunk.position.set(x, y + 5, z);
    trunk.castShadow = true;
    scene.add(trunk);
    
    // Physics
    const tShape = new CANNON.Cylinder(1.5, 1.5, 10, 8);
    const tBody = new CANNON.Body({ mass: 0 });
    const q = new CANNON.Quaternion();
    q.setFromAxisAngle(new CANNON.Vec3(1,0,0), -Math.PI/2);
    tBody.addShape(tShape, new CANNON.Vec3(), q);
    tBody.position.copy(trunk.position);
    world.addBody(tBody);
    
    // Leaves (Low poly)
    const leafGeo = new THREE.ConeGeometry(4, 10, 4);
    const leafMat = new THREE.MeshLambertMaterial({ color: 0x228b22 });
    for(let i=0; i<4; i++) {
        const leaf = new THREE.Mesh(leafGeo, leafMat);
        leaf.position.set(x, y + 10, z);
        leaf.rotation.x = Math.PI/4;
        leaf.rotation.y = (Math.PI/2) * i;
        leaf.castShadow = true;
        scene.add(leaf);
    }
}

function generateWaterParkMap() {
    initTextures();

    // ---------------------------------------------------------
    // GROUND & WATER
    // ---------------------------------------------------------
    // Huge water plane base
    createRigidBody(0, -2, 0, 400, 2, 400, 'water', 0, 0, 0.8);
    // Ocean floor (solid)
    createRigidBody(0, -8, 0, 400, 2, 400, 'sand', 0, 0, 1.0);

    // ---------------------------------------------------------
    // ISLANDS (SAND)
    // ---------------------------------------------------------
    createRigidBody(0, 0, 0, 100, 2, 100, 'sand'); // Center Island
    createRigidBody(150, 0, 0, 80, 2, 80, 'sand'); // East Island
    createRigidBody(-150, 0, 0, 80, 2, 80, 'sand'); // West Island
    createRigidBody(0, 0, 150, 80, 2, 80, 'sand'); // North Island
    createRigidBody(0, 0, -150, 80, 2, 80, 'sand'); // South Island

    // ---------------------------------------------------------
    // BRIDGES (WOOD)
    // ---------------------------------------------------------
    createRigidBody(75, 0, 0, 80, 2, 20, 'wood');
    createRigidBody(-75, 0, 0, 80, 2, 20, 'wood');
    createRigidBody(0, 0, 75, 20, 2, 80, 'wood');
    createRigidBody(0, 0, -75, 20, 2, 80, 'wood');

    // ---------------------------------------------------------
    // WATER SLIDES (ELEVATED RAMPS)
    // ---------------------------------------------------------
    // Tower 1
    createRigidBody(-100, 15, -100, 30, 30, 30, 'wood'); 
    // Ramp down to center
    createRigidBody(-50, 8, -50, 15, 2, 100, 'slide', Math.PI/8, 0);

    // Tower 2
    createRigidBody(100, 15, 100, 30, 30, 30, 'wood');
    // Ramp down to center
    createRigidBody(50, 8, 50, 15, 2, 100, 'slide', -Math.PI/8, 0);

    // ---------------------------------------------------------
    // PALM TREES & PROPS
    // ---------------------------------------------------------
    const treePositions = [
        [20, 1, 20], [-20, 1, -20], [20, 1, -20], [-20, 1, 20],
        [150, 1, 20], [150, 1, -20], [-150, 1, 20], [-150, 1, -20],
        [20, 1, 150], [-20, 1, 150], [20, 1, -150], [-20, 1, -150]
    ];
    treePositions.forEach(p => createPalmTree(p[0], p[1], p[2]));

    // ---------------------------------------------------------
    // WAYPOINTS FOR AI
    // ---------------------------------------------------------
    const wpCoords = [
        [0,0], [50,0], [-50,0], [0,50], [0,-50],
        [150,0], [-150,0], [0,150], [0,-150],
        [-100,-100], [100,100] // Towers
    ];
    wpCoords.forEach((c, i) => waypoints.push({id: i, x: c[0], z: c[1]}));
}

// ==========================================================================
// WEAPON SYSTEM & PICKUPS
// ==========================================================================
const WEAPONS = {
    MACHINE_GUN: { name: "M-GUN", color: 0xffaa00, type: 'bullet', speed: 150, dmg: 10, rate: 0.1, spread: 0.05, ammo: 40 },
    ROCKET: { name: "ROCKET", color: 0xff0000, type: 'explosive', speed: 80, dmg: 40, rate: 1.0, radius: 15, ammo: 5 },
    MINES: { name: "MINE", color: 0x333333, type: 'trap', speed: 0, dmg: 50, rate: 0.5, radius: 20, ammo: 3 }
};

class WeaponBox {
    constructor(x, y, z) {
        this.mesh = new THREE.Mesh(
            new THREE.BoxGeometry(4, 4, 4),
            new THREE.MeshLambertMaterial({ map: TexCache['box'] })
        );
        this.baseY = y + 2;
        this.mesh.position.set(x, this.baseY, z);
        this.mesh.castShadow = true;
        scene.add(this.mesh);
        
        this.active = true;
        this.respawnTimer = 0;
    }
    
    update(dt) {
        if(this.active) {
            this.mesh.rotation.y += 2 * dt;
            this.mesh.rotation.x += 1 * dt;
            this.mesh.position.y = this.baseY + Math.sin(performance.now() * 0.005);
        } else {
            this.respawnTimer -= dt;
            if(this.respawnTimer <= 0) {
                this.active = true;
                this.mesh.visible = true;
            }
        }
    }
    
    collect() {
        if(!this.active) return null;
        this.active = false;
        this.mesh.visible = false;
        this.respawnTimer = 10; // 10 seconds respawn
        
        const keys = Object.keys(WEAPONS);
        return WEAPONS[keys[Math.floor(Math.random() * keys.length)]];
    }
}

function initWeaponBoxes() {
    const boxPos = [
        [0,0,0], [150,0,0], [-150,0,0], [0,0,150], [0,0,-150],
        [-100,16,-100], [100,16,100] // Tower boxes
    ];
    boxPos.forEach(p => weaponPickups.push(new WeaponBox(p[0], p[1], p[2])));
}

// ==========================================================================
// PARTICLES & EFFECTS
// ==========================================================================
class Particle {
    constructor(x, y, z, color, speed, life) {
        this.mesh = new THREE.Mesh(
            new THREE.BoxGeometry(1,1,1),
            new THREE.MeshBasicMaterial({ color: color, transparent: true })
        );
        this.mesh.position.set(x,y,z);
        scene.add(this.mesh);
        
        this.vel = new THREE.Vector3(
            (Math.random() - 0.5) * speed,
            Math.random() * speed,
            (Math.random() - 0.5) * speed
        );
        this.life = life;
        this.maxLife = life;
    }
    
    update(dt) {
        this.mesh.position.addScaledVector(this.vel, dt);
        this.vel.y -= 30 * dt; // gravity
        this.life -= dt;
        this.mesh.scale.setScalar(Math.max(0, this.life / this.maxLife));
        this.mesh.material.opacity = this.life / this.maxLife;
        return this.life > 0;
    }
    
    dispose() {
        scene.remove(this.mesh);
        this.mesh.geometry.dispose();
        this.mesh.material.dispose();
    }
}

function spawnExplosion(x, y, z, color) {
    for(let i=0; i<20; i++) {
        particleSystems.push(new Particle(x, y, z, color, 40, 1.0));
    }
}

// ==========================================================================
// KART ENTITY (PLAYER & AI)
// ==========================================================================
class Kart {
    constructor(isPlayer, name, startX, startZ, colorHex) {
        this.isPlayer = isPlayer;
        this.name = name;
        this.hp = 100;
        this.maxHp = 100;
        this.kills = 0;
        this.deaths = 0;
        this.weapon = null;
        this.ammo = 0;
        this.fireCooldown = 0;
        
        // --- PHYSICS CHASSIS ---
        const cShape = new CANNON.Box(new CANNON.Vec3(1.5, 0.75, 2.5));
        this.body = new CANNON.Body({ mass: 400, material: physicsMaterial });
        this.body.addShape(cShape);
        this.body.position.set(startX, 10, startZ);
        this.body.linearDamping = 0.1;
        this.body.angularDamping = 0.5;
        
        // --- VISUAL MESH ---
        this.meshGroup = new THREE.Group();
        
        // Kart Body
        const mGeo = new THREE.BoxGeometry(3, 1.5, 5);
        const mMat = new THREE.MeshLambertMaterial({ color: colorHex });
        this.bodyMesh = new THREE.Mesh(mGeo, mMat);
        this.bodyMesh.position.y = 0.75;
        this.bodyMesh.castShadow = true;
        this.meshGroup.add(this.bodyMesh);
        
        // Character Head (Sphere)
        const hGeo = new THREE.SphereGeometry(1.2, 16, 16);
        const hMat = new THREE.MeshLambertMaterial({ color: 0xffdcb5 }); // Skin tone
        const head = new THREE.Mesh(hGeo, hMat);
        head.position.set(0, 2.5, -0.5);
        this.meshGroup.add(head);

        // Wheels
        const wGeo = new THREE.CylinderGeometry(0.8, 0.8, 0.8, 16);
        wGeo.rotateZ(Math.PI/2);
        const wMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
        this.wheels = [];
        for(let i=0; i<4; i++) {
            const w = new THREE.Mesh(wGeo, wMat);
            this.meshGroup.add(w);
            this.wheels.push(w);
        }
        
        scene.add(this.meshGroup);
        world.addBody(this.body);
        
        // --- VEHICLE SETUP ---
        this.vehicle = new CANNON.RaycastVehicle({
            chassisBody: this.body,
            indexRightAxis: 0, indexUpAxis: 1, indexForwardAxis: 2
        });
        
        const wOpt = {
            radius: 0.8,
            directionLocal: new CANNON.Vec3(0, -1, 0),
            suspensionStiffness: 30,
            suspensionRestLength: 0.3,
            frictionSlip: 3,
            dampingRelaxation: 2.3,
            dampingCompression: 4.4,
            maxSuspensionForce: 100000,
            rollInfluence: 0.1,
            axleLocal: new CANNON.Vec3(-1, 0, 0),
            chassisConnectionPointLocal: new CANNON.Vec3(),
            maxSuspensionTravel: 0.5,
            customSlidingRotationalSpeed: -30,
            useCustomSlidingRotationalSpeed: true
        };
        
        // Add 4 wheels
        const hw = 1.8, hl = 2.0, hy = 0;
        wOpt.chassisConnectionPointLocal.set(hw, hy, hl); this.vehicle.addWheel(wOpt); // FL
        wOpt.chassisConnectionPointLocal.set(-hw, hy, hl); this.vehicle.addWheel(wOpt); // FR
        wOpt.chassisConnectionPointLocal.set(hw, hy, -hl); this.vehicle.addWheel(wOpt); // BL
        wOpt.chassisConnectionPointLocal.set(-hw, hy, -hl); this.vehicle.addWheel(wOpt); // BR
        
        this.vehicle.addToWorld(world);
        
        // AI State
        if(!this.isPlayer) {
            this.targetWp = null;
            this.stuckTimer = 0;
            this.lastPos = new THREE.Vector3();
        }
    }
    
    update(dt) {
        if(this.hp <= 0) return; // Dead
        
        // Sync Visuals
        this.meshGroup.position.copy(this.body.position);
        this.meshGroup.quaternion.copy(this.body.quaternion);
        
        for (let i = 0; i < this.vehicle.wheelInfos.length; i++) {
            this.vehicle.updateWheelTransform(i);
            const t = this.vehicle.wheelInfos[i].worldTransform;
            this.wheels[i].position.copy(t.position);
            this.wheels[i].quaternion.copy(t.quaternion);
        }
        
        // Water fall death
        if(this.body.position.y < -5) {
            this.takeDamage(1000, null); // Drown
        }
        
        // Weapons
        if(this.fireCooldown > 0) this.fireCooldown -= dt;
        
        // Controller
        if(this.isPlayer) {
            this.handlePlayerInput();
        } else {
            this.handleAI(dt);
        }
        
        // Pickups
        weaponPickups.forEach(box => {
            if(box.active && this.meshGroup.position.distanceTo(box.mesh.position) < 5) {
                const w = box.collect();
                if(w) {
                    this.weapon = w;
                    this.ammo = w.ammo;
                }
            }
        });
    }
    
    handlePlayerInput() {
        const engineForce = 3000;
        const maxSteer = 0.5;
        
        this.vehicle.setSteeringValue(0, 0);
        this.vehicle.setSteeringValue(0, 1);
        this.vehicle.applyEngineForce(0, 2);
        this.vehicle.applyEngineForce(0, 3);
        
        if (inputState.w) {
            this.vehicle.applyEngineForce(-engineForce, 2);
            this.vehicle.applyEngineForce(-engineForce, 3);
        }
        if (inputState.s) {
            this.vehicle.applyEngineForce(engineForce/2, 2);
            this.vehicle.applyEngineForce(engineForce/2, 3);
        }
        if (inputState.a) {
            this.vehicle.setSteeringValue(maxSteer, 0);
            this.vehicle.setSteeringValue(maxSteer, 1);
        }
        if (inputState.d) {
            this.vehicle.setSteeringValue(-maxSteer, 0);
            this.vehicle.setSteeringValue(-maxSteer, 1);
        }
        if (inputState.space) {
            this.fireWeapon();
        }
    }
    
    handleAI(dt) {
        const engineForce = 2000;
        const maxSteer = 0.5;
        
        // 1. Unstuck Logic
        if(this.meshGroup.position.distanceTo(this.lastPos) < 0.2) {
            this.stuckTimer += dt;
        } else {
            this.stuckTimer = 0;
        }
        this.lastPos.copy(this.meshGroup.position);
        
        if(this.stuckTimer > 2.0) {
            // Reverse
            this.vehicle.applyEngineForce(engineForce, 2);
            this.vehicle.applyEngineForce(engineForce, 3);
            this.vehicle.setSteeringValue(maxSteer, 0);
            this.vehicle.setSteeringValue(maxSteer, 1);
            if(this.stuckTimer > 4.0) {
                this.targetWp = waypoints[Math.floor(Math.random()*waypoints.length)];
                this.stuckTimer = 0;
            }
            return;
        }

        // 2. Target selection
        let targetPos = null;
        
        // If has weapon, hunt player/others
        if(this.weapon) {
            let nearest = null;
            let minDist = 1000;
            karts.forEach(k => {
                if(k !== this && k.hp > 0) {
                    let d = this.meshGroup.position.distanceTo(k.meshGroup.position);
                    if(d < minDist) { minDist = d; nearest = k; }
                }
            });
            if(nearest) {
                targetPos = nearest.meshGroup.position;
                // Shoot if looking at target
                let dirToTarget = new THREE.Vector3().subVectors(targetPos, this.meshGroup.position).normalize();
                let forward = new THREE.Vector3(0,0,1).applyQuaternion(this.meshGroup.quaternion).normalize();
                if(forward.dot(dirToTarget) > 0.8 && minDist < 100) {
                    this.fireWeapon();
                }
            }
        }
        
        // If no target, go to waypoint
        if(!targetPos) {
            if(!this.targetWp) this.targetWp = waypoints[Math.floor(Math.random()*waypoints.length)];
            targetPos = new THREE.Vector3(this.targetWp.x, this.meshGroup.position.y, this.targetWp.z);
            if(this.meshGroup.position.distanceTo(targetPos) < 10) {
                this.targetWp = waypoints[Math.floor(Math.random()*waypoints.length)]; // Pick new
            }
        }
        
        // 3. Steering Calculation
        let localTarget = this.body.vectorToLocalFrame(new CANNON.Vec3(targetPos.x, targetPos.y, targetPos.z));
        let steer = Math.atan2(localTarget.x, localTarget.z);
        steer = Math.max(-maxSteer, Math.min(maxSteer, steer));
        
        this.vehicle.setSteeringValue(steer, 0);
        this.vehicle.setSteeringValue(steer, 1);
        this.vehicle.applyEngineForce(-engineForce, 2);
        this.vehicle.applyEngineForce(-engineForce, 3);
    }
    
    fireWeapon() {
        if(!this.weapon || this.fireCooldown > 0 || this.ammo <= 0) return;
        
        this.fireCooldown = this.weapon.rate;
        this.ammo--;
        
        let forward = new THREE.Vector3(0,0,1).applyQuaternion(this.meshGroup.quaternion).normalize();
        let spawnPos = this.meshGroup.position.clone().add(forward.clone().multiplyScalar(4));
        spawnPos.y += 1;
        
        if(this.weapon.type === 'trap') {
            // Drop behind
            let back = forward.clone().multiplyScalar(-1);
            spawnPos = this.meshGroup.position.clone().add(back.multiplyScalar(4));
            forward = new THREE.Vector3(0,0,0);
        }
        
        // Add random spread
        if(this.weapon.spread) {
            forward.x += (Math.random() - 0.5) * this.weapon.spread;
            forward.y += (Math.random() - 0.5) * this.weapon.spread;
            forward.z += (Math.random() - 0.5) * this.weapon.spread;
            forward.normalize();
        }
        
        const proj = new Projectile(this, this.weapon, spawnPos, forward);
        activeProjectiles.push(proj);
        
        if(this.ammo <= 0) this.weapon = null;
    }
    
    takeDamage(amt, attacker) {
        if(this.hp <= 0) return;
        this.hp -= amt;
        
        spawnExplosion(this.meshGroup.position.x, this.meshGroup.position.y+1, this.meshGroup.position.z, 0xff0000);
        
        if(this.isPlayer) updateHUD();
        
        if(this.hp <= 0) this.die(attacker);
    }
    
    die(attacker) {
        this.deaths++;
        if(attacker && attacker !== this) {
            attacker.kills++;
            showKill(attacker.name, this.name);
        } else {
            showKill("WORLD", this.name);
        }
        
        spawnExplosion(this.meshGroup.position.x, this.meshGroup.position.y, this.meshGroup.position.z, 0xffaa00);
        
        this.meshGroup.visible = false;
        this.body.position.set(0, -100, 0); // Move away
        this.vehicle.setBrake(1000, 0);
        this.vehicle.setBrake(1000, 1);
        this.vehicle.setBrake(1000, 2);
        this.vehicle.setBrake(1000, 3);
        
        setTimeout(() => this.respawn(), 3000);
    }
    
    respawn() {
        if(!gameActive) return;
        this.hp = this.maxHp;
        this.weapon = null;
        this.ammo = 0;
        this.meshGroup.visible = true;
        
        let wp = waypoints[Math.floor(Math.random() * waypoints.length)];
        this.body.position.set(wp.x, 20, wp.z);
        this.body.velocity.set(0,0,0);
        this.body.angularVelocity.set(0,0,0);
        
        const q = new CANNON.Quaternion();
        q.setFromAxisAngle(new CANNON.Vec3(0,1,0), Math.random()*Math.PI*2);
        this.body.quaternion.copy(q);
        
        if(this.isPlayer) updateHUD();
    }
}

// ==========================================================================
// PROJECTILES
// ==========================================================================
class Projectile {
    constructor(owner, weaponData, pos, dir) {
        this.owner = owner;
        this.data = weaponData;
        this.life = 5.0;
        this.pos = pos.clone();
        this.dir = dir.clone();
        
        let geo = new THREE.SphereGeometry(1, 8, 8);
        if(weaponData.type === 'bullet') geo = new THREE.BoxGeometry(0.5, 0.5, 2);
        
        this.mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: weaponData.color }));
        this.mesh.position.copy(pos);
        if(dir.lengthSq() > 0) this.mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1), dir);
        scene.add(this.mesh);
    }
    
    update(dt) {
        this.life -= dt;
        
        // Manual integration for speed
        this.pos.addScaledVector(this.dir, this.data.speed * dt);
        this.mesh.position.copy(this.pos);
        
        // Collision
        let hit = false;
        karts.forEach(k => {
            if(k !== this.owner && k.hp > 0) {
                if(this.pos.distanceTo(k.meshGroup.position) < 4.0) {
                    hit = true;
                }
            }
        });
        
        if(this.pos.y < -2 || this.life <= 0 || hit) {
            this.explode();
            return false;
        }
        return true;
    }
    
    explode() {
        spawnExplosion(this.pos.x, this.pos.y, this.pos.z, this.data.color);
        
        if(this.data.radius) {
            karts.forEach(k => {
                if(k.hp <= 0) return;
                let d = this.pos.distanceTo(k.meshGroup.position);
                if(d <= this.data.radius) {
                    let dmg = this.data.dmg * (1 - (d/this.data.radius));
                    k.takeDamage(dmg, this.owner);
                    // Knockback
                    let dir = new THREE.Vector3().subVectors(k.meshGroup.position, this.pos).normalize();
                    k.body.velocity.x += dir.x * 30;
                    k.body.velocity.y += 20;
                    k.body.velocity.z += dir.z * 30;
                }
            });
        } else {
            // Direct hit check
            karts.forEach(k => {
                if(k !== this.owner && k.hp > 0 && this.pos.distanceTo(k.meshGroup.position) < 5.0) {
                    k.takeDamage(this.data.dmg, this.owner);
                }
            });
        }
        
        scene.remove(this.mesh);
        this.mesh.geometry.dispose();
        this.mesh.material.dispose();
    }
}

// ==========================================================================
// UI MANAGERS
// ==========================================================================
function updateHUD() {
    if(!myKart) return;
    
    // Health Bar
    const hpPercent = Math.max(0, (myKart.hp / myKart.maxHp) * 100);
    document.getElementById('healthBarFill').style.width = hpPercent + '%';
    
    // Time
    const min = Math.floor(timeRemaining / 60);
    const sec = Math.floor(timeRemaining % 60);
    document.getElementById('timerValue').innerText = `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
}

function showKill(killer, victim) {
    const kf = document.getElementById('killfeed');
    const el = document.createElement('div');
    el.style.background = 'rgba(0,0,0,0.5)';
    el.style.color = 'white';
    el.style.padding = '5px 15px';
    el.style.borderRadius = '5px';
    el.style.marginBottom = '5px';
    el.style.borderLeft = '4px solid #ff4400';
    el.innerHTML = `<b>${killer}</b> eliminated <b>${victim}</b>`;
    kf.appendChild(el);
    setTimeout(() => { if(el.parentNode) el.parentNode.removeChild(el); }, 3000);
}

// ==========================================================================
// GAME LOOP & STATE
// ==========================================================================
function startGame() {
    const nameInput = document.getElementById('playerNameInput').value.trim();
    if(nameInput) localPlayerName = nameInput;
    
    document.getElementById('mainMenu').style.display = 'none';
    document.getElementById('uiLayer').style.display = 'block';
    
    initGraphicsAndPhysics();
    generateWaterParkMap();
    initWeaponBoxes();
    
    // Create Players
    myKart = new Kart(true, localPlayerName, 0, 50, 0x000000); // Black kart based on image
    karts.push(myKart);
    
    // Create Bots
    for(let i=0; i<8; i++) {
        let wp = waypoints[Math.floor(Math.random()*waypoints.length)];
        let color = Math.random() * 0xffffff;
        karts.push(new Kart(false, botRoster[i], wp.x, wp.z, color));
    }
    
    gameActive = true;
    timeRemaining = GAME_DURATION;
    lastFrameTime = performance.now();
    
    requestAnimationFrame(gameLoop);
}

function gameLoop() {
    if(!gameActive) return;
    requestAnimationFrame(gameLoop);
    
    const now = performance.now();
    let dt = (now - lastFrameTime) / 1000;
    lastFrameTime = now;
    if(dt > 0.1) dt = 0.1; // Cap delta
    
    // Timer
    timeRemaining -= dt;
    if(timeRemaining <= 0) {
        alert("GAME OVER! Check console for scores.");
        console.table(karts.map(k => ({Name: k.name, Kills: k.kills, Deaths: k.deaths})).sort((a,b)=>b.Kills-a.Kills));
        location.reload();
        return;
    }
    
    // Physics
    world.step(1/60, dt, 3);
    
    // Entities
    karts.forEach(k => k.update(dt));
    weaponPickups.forEach(w => w.update(dt));
    
    for(let i=activeProjectiles.length-1; i>=0; i--) {
        if(!activeProjectiles[i].update(dt)) {
            activeProjectiles.splice(i, 1);
        }
    }
    
    for(let i=particleSystems.length-1; i>=0; i--) {
        if(!particleSystems[i].update(dt)) {
            particleSystems[i].dispose();
            particleSystems.splice(i, 1);
        }
    }
    
    updateHUD();
    
    // Camera follow (Smooth lerp)
    if(myKart && myKart.hp > 0) {
        const camOffset = new THREE.Vector3(0, 10, -20);
        const targetPos = camOffset.applyMatrix4(myKart.bodyMesh.matrixWorld);
        camera.position.lerp(targetPos, 0.1);
        camera.lookAt(myKart.meshGroup.position.clone().add(new THREE.Vector3(0,2,0)));
    }
    
    renderer.render(scene, camera);
}

// BIND PLAY BUTTON
document.getElementById('playBtn').addEventListener('click', startGame);

</script>
